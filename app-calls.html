<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守护宝贝 - 通话记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #F5F7FA; }
        .phone { max-width: 414px; margin: 0 auto; background: #F5F7FA; min-height: 100vh; position: relative; }
        .status-bar { height: 44px; background: #4A90D9; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 0; color: #fff; font-size: 14px; font-weight: 600; }
        .header { background: linear-gradient(135deg, #4A90D9, #357ABD); padding: 15px 20px 25px; color: #fff; }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { font-size: 20px; }
        .header-title { font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 35px; }
        .call-tabs { display: flex; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px; }
        .call-tab { flex: 1; padding: 8px 0; text-align: center; border-radius: 16px; font-size: 14px; }
        .call-tab.active { background: #fff; color: #4A90D9; font-weight: 600; }
        .content { padding: 0 15px 100px; margin-top: -15px; }
        .call-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 14px; padding: 15px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .stat-number { font-size: 24px; font-weight: 700; color: #4A90D9; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: #999; }
        .section-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .call-list { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .call-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f5f5f5; }
        .call-avatar { width: 48px; height: 48px; border-radius: 50%; background: #E8F4FD; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 12px; }
        .call-info { flex: 1; }
        .call-name { font-size: 15px; color: #333; font-weight: 500; margin-bottom: 4px; }
        .call-meta { font-size: 12px; color: #999; }
        .call-time { font-size: 12px; color: #bbb; }
        .call-action { width: 40px; height: 40px; background: #4A90D9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; }
        .whitelist-card { background: #fff; border-radius: 16px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .whitelist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .whitelist-title { font-size: 16px; font-weight: 600; color: #333; }
        .manage-btn { color: #4A90D9; font-size: 14px; }
        .contact-chips { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .contact-chip { display: flex; align-items: center; gap: 6px; background: #F8F9FA; padding: 8px 12px; border-radius: 20px; }
        .chip-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #4A90D9, #357ABD); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; }
        .chip-name { font-size: 13px; color: #333; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="status-bar"><span>10:30</span><span>📶 5G 🔋</span></div>
        <div class="header">
            <div class="header-top"><span class="back-btn">←</span><span class="header-title">通话记录</span></div>
            <div class="call-tabs">
                <div class="call-tab active">全部</div>
                <div class="call-tab">未接</div>
                <div class="call-tab">白名单</div>
            </div>
        </div>
        <div class="content">
            <div class="call-stats">
                <div class="stat-card"><div class="stat-number">28</div><div class="stat-label">今日通话</div></div>
                <div class="stat-card"><div class="stat-number">156</div><div class="stat-label">本月通话</div></div>
                <div class="stat-card"><div class="stat-number">12</div><div class="stat-label">白名单</div></div>
            </div>
            
            <div class="section-title"><span>最近通话</span></div>
            
            <div class="call-list">
                <div class="call-item">
                    <div class="call-avatar">👩</div>
                    <div class="call-info"><div class="call-name">妈妈</div><div class="call-meta">📥 呼入 · 2分35秒</div></div>
                    <div class="call-time">10:25</div>
                    <div class="call-action">📞</div>
                </div>
                <div class="call-item">
                    <div class="call-avatar">👨</div>
                    <div class="call-info"><div class="call-name">爸爸</div><div class="call-meta">📤 呼出 · 1分12秒</div></div>
                    <div class="call-time">09:48</div>
                    <div class="call-action">📞</div>
                </div>
                <div class="call-item">
                    <div class="call-avatar">👵</div>
                    <div class="call-info"><div class="call-name">奶奶</div><div class="call-meta">📥 呼入 · 5分08秒</div></div>
                    <div class="call-time">昨天</div>
                    <div class="call-action">📞</div>
                </div>
            </div>
            
            <div class="whitelist-card">
                <div class="whitelist-header"><span class="whitelist-title">通话白名单</span><span class="manage-btn">管理</span></div>
                <div class="whitelist-desc">仅允许白名单内的联系人给孩子打电话，防止骚扰电话</div>
                <div class="contact-chips">
                    <div class="contact-chip"><div class="chip-avatar">👩</div><span class="chip-name">妈妈</span></div>
                    <div class="contact-chip"><div class="chip-avatar">👨</div><span class="chip-name">爸爸</span></div>
                    <div class="contact-chip"><div class="chip-avatar">👵</div><span class="chip-name">奶奶</span></div>
                    <div class="contact-chip"><div class="chip-avatar">👴</div><span class="chip-name">爷爷</span></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
