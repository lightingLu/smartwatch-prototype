<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童手表 - 主界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .watch-container {
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* 手表外壳 */
        .watch-frame {
            width: 280px;
            height: 340px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 40px;
            padding: 15px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.3),
                inset 0 2px 4px rgba(255,255,255,0.1);
            position: relative;
        }
        
        .watch-frame::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -8px;
            width: 6px;
            height: 40px;
            background: #333;
            border-radius: 0 3px 3px 0;
            transform: translateY(-50%);
        }
        
        /* 手表屏幕 */
        .watch-screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }
        
        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            font-size: 11px;
            color: #fff;
        }
        
        .signal-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }
        
        .signal-bar {
            width: 3px;
            background: #fff;
            border-radius: 1px;
        }
        
        .signal-bar:nth-child(1) { height: 4px; }
        .signal-bar:nth-child(2) { height: 6px; }
        .signal-bar:nth-child(3) { height: 8px; }
        .signal-bar:nth-child(4) { height: 10px; }
        
        .battery {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .battery-icon {
            width: 18px;
            height: 9px;
            border: 1.5px solid #fff;
            border-radius: 2px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1px;
        }
        
        .battery-icon::after {
            content: '';
            position: absolute;
            right: -3px;
            width: 2px;
            height: 5px;
            background: #fff;
            border-radius: 0 1px 1px 0;
        }
        
        .battery-level {
            width: 70%;
            height: 100%;
            background: #7ED321;
            border-radius: 1px;
        }
        
        /* 主界面内容 */
        .main-content {
            padding: 10px 15px;
            text-align: center;
        }
        
        .time-display {
            color: #fff;
            margin-bottom: 5px;
        }
        
        .time {
            font-size: 52px;
            font-weight: 200;
            letter-spacing: -1px;
            line-height: 1;
        }
        
        .date {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }
        
        .weather-widget {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .weather-icon {
            font-size: 24px;
        }
        
        .weather-info {
            color: #fff;
            text-align: left;
        }
        
        .weather-temp {
            font-size: 16px;
            font-weight: 600;
        }
        
        .weather-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }
        
        /* 快捷功能网格 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .action-btn {
            aspect-ratio: 1;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-btn.call {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
        }
        
        .action-btn.message {
            background: linear-gradient(135deg, #7ED321, #6BC01A);
        }
        
        .action-btn.sos {
            background: linear-gradient(135deg, #D0021B, #B8001A);
        }
        
        .action-icon {
            font-size: 22px;
        }
        
        .action-label {
            font-size: 10px;
            color: #fff;
            font-weight: 500;
        }
        
        /* 底部指示器 */
        .page-indicator {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        
        .dot.active {
            background: #fff;
            width: 18px;
            border-radius: 3px;
        }
        
        /* 通话界面 */
        .call-screen {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .call-header {
            text-align: center;
            padding: 30px 20px;
            color: #fff;
        }
        
        .caller-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4A90D9, #764ba2);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        
        .caller-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .call-status {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        
        .call-actions {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: auto;
            padding: 30px 20px;
        }
        
        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .call-btn:active {
            transform: scale(0.95);
        }
        
        .call-btn.accept {
            background: #7ED321;
        }
        
        .call-btn.decline {
            background: #D0021B;
        }
        
        /* SOS界面 */
        .sos-screen {
            background: linear-gradient(180deg, #D0021B 0%, #8B0000 100%);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        
        .sos-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .sos-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .sos-desc {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        .sos-cancel {
            margin-top: 40px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* 语音消息界面 */
        .voice-screen {
            background: #000;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .voice-header {
            padding: 15px;
            text-align: center;
            color: #fff;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .voice-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .voice-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .voice-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4A90D9, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .voice-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #4A90D9;
            padding: 8px 12px;
            border-radius: 15px;
            color: #fff;
        }
        
        .voice-wave {
            display: flex;
            gap: 2px;
            align-items: center;
        }
        
        .wave-bar {
            width: 3px;
            background: #fff;
            border-radius: 1px;
        }
        
        .voice-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        
        .voice-input {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .voice-btn {
            flex: 1;
            height: 44px;
            background: linear-gradient(135deg, #4A90D9, #357ABD);
            border: none;
            border-radius: 22px;
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }
        
        /* 标签 */
        .screen-label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="watch-container">
        <!-- 主界面 -->
        <div style="position: relative;">
            <div class="watch-frame">
                <div class="watch-screen">
                    <div class="status-bar">
                        <div class="signal-bars">
                            <div class="signal-bar"></div>
                            <div class="signal-bar"></div>
                            <div class="signal-bar"></div>
                            <div class="signal-bar"></div>
                        </div>
                        <span>4G</span>
                        <div class="battery">
                            <div class="battery-icon">
                                <div class="battery-level"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="main-content">
                        <div class="time-display">
                            <div class="time">10:30</div>
                            <div class="date">3月2日 周一</div>
                        </div>
                        
                        <div class="weather-widget">
                            <span class="weather-icon">☀️</span>
                            <div class="weather-info">
                                <div class="weather-temp">18°C</div>
                                <div class="weather-desc">晴朗 空气质量优</div>
                            </div>
                        </div>
                        
                        <div class="quick-actions">
                            <div class="action-btn call">
                                <span class="action-icon">📞</span>
                                <span class="action-label">打电话</span>
                            </div>
                            <div class="action-btn message">
                                <span class="action-icon">💬</span>
                                <span class="action-label">发语音</span>
                            </div>
                            <div class="action-btn sos">
                                <span class="action-icon">🆘</span>
                                <span class="action-label">紧急</span>
                            </div>
                        </div>
                        
                        <div class="page-indicator">
                            <div class="dot active"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="screen-label">主界面</div>
        </div>
        
        <!-- 通话界面 -->
        <div style="position: relative;">
            <div class="watch-frame">
                <div class="watch-screen">
                    <div class="call-screen">
                        <div class="status-bar">
                            <div class="signal-bars">
                                <div class="signal-bar"></div>
                                <div class="signal-bar"></div>
                                <div class="signal-bar"></div>
                                <div class="signal-bar"></div>
                            </div>
                            <span>4G</span>
                            <div class="battery">
                                <div class="battery-icon">
                                    <div class="battery-level"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="call-header">
                            <div class="caller-avatar">👩</div>
                            <div class="caller-name">妈妈</div>
                            <div class="call-status">正在呼叫...</div>
                        </div>
                        
                        <div class="call-actions">
                            <div class="call-btn decline">📞</div>
                            <div class="call-btn accept">📞</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="screen-label">通话界面</div>
        </div>
        
        <!-- SOS界面 -->
        <div style="position: relative;">
            <div class="watch-frame">
                <div class="watch-screen">
                    <div class="sos-screen">
                        <div class="sos-icon">🆘</div>
                        <div class="sos-title">紧急求助</div>
                        <div class="sos-desc">正在向家长发送<br>位置信息和求救信号</div>
                        <button class="sos-cancel">取消求救</button>
                    </div>
                </div>
            </div>
            <div class="screen-label">SOS紧急界面</div>
        </div>
        
        <!-- 语音消息界面 -->
        <div style="position: relative;">
            <div class="watch-frame">
                <div class="watch-screen">
                    <div class="voice-screen">
                        <div class="status-bar">
                            <div class="signal-bars">
                                <div class="signal-bar"></div>
                                <div class="signal-bar"></div>
                                <div class="signal-bar"></div>
                                <div class="signal-bar"></div>
                            </div>
                            <span>4G</span>
                            <div class="battery">
                                <div class="battery-icon">
                                    <div class="battery-level"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="voice-header">语音消息</div>
                        
                        <div class="voice-list">
                            <div class="voice-item">
                                <div class="voice-avatar">👩</div>
                                <div class="voice-content">
                                    <div class="voice-wave">
                                        <div class="wave-bar" style="height: 8px;"></div>
                                        <div class="wave-bar" style="height: 12px;"></div>
                                        <div class="wave-bar" style="height: 6px;"></div>
                                        <div class="wave-bar" style="height: 14px;"></div>
                                        <div class="wave-bar" style="height: 10px;"></div>
                                    </div>
                                    <span>5"</span>
                                </div>
                                <span class="voice-time">10:25</span>
                            </div>
                            
                            <div class="voice-item">
                                <div class="voice-avatar">👨</div>
                                <div class="voice-content">
                                    <div class="voice-wave">
                                        <div class="wave-bar" style="height: 10px;"></div>
                                        <div class="wave-bar" style="height: 8px;"></div>
                                        <div class="wave-bar" style="height: 14px;"></div>
                                        <div class="wave-bar" style="height: 6px;"></div>
                                    </div>
                                    <span>3"</span>
                                </div>
                                <span class="voice-time">10:20</span>
                            </div>
                        </div>
                        
                        <div class="voice-input">
                            <button class="voice-btn">
                                <span>🎤</span>
                                <span>按住说话</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="screen-label">语音消息界面</div>
        </div>
    </div>
</body>
</html>
