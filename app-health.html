<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守护宝贝 - 健康数据</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #F5F7FA; }
        .phone { max-width: 414px; margin: 0 auto; background: #F5F7FA; min-height: 100vh; position: relative; }
        .status-bar { height: 44px; background: #4A90D9; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 0; color: #fff; font-size: 14px; font-weight: 600; }
        .header { background: linear-gradient(135deg, #4A90D9, #357ABD); padding: 15px 20px 25px; color: #fff; }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .back-btn { font-size: 20px; }
        .header-title { font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 35px; }
        .content { padding: 0 15px 30px; margin-top: -15px; }
        
        .date-tabs { display: flex; background: #fff; border-radius: 12px; padding: 4px; margin-bottom: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .date-tab { flex: 1; padding: 10px 0; text-align: center; border-radius: 8px; font-size: 14px; color: #666; }
        .date-tab.active { background: #4A90D9; color: #fff; font-weight: 500; }
        
        .health-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .health-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .health-title { font-size: 16px; font-weight: 600; color: #333; }
        .health-value { font-size: 28px; font-weight: 700; color: #4A90D9; }
        .health-unit { font-size: 14px; color: #999; margin-left: 4px; }
        .health-goal { font-size: 12px; color: #999; margin-top: 5px; }
        .health-chart { height: 100px; background: linear-gradient(180deg, #E8F4FD 0%, #fff 100%); border-radius: 10px; display: flex; align-items: flex-end; justify-content: space-around; padding: 15px; }
        .chart-bar { width: 20px; background: linear-gradient(180deg, #4A90D9, #357ABD); border-radius: 10px 10px 0 0; }
        .chart-labels { display: flex; justify-content: space-around; margin-top: 8px; }
        .chart-label { font-size: 11px; color: #999; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; }
        .stat-box { background: #fff; border-radius: 14px; padding: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; }
        .stat-icon.orange { background: #FFF3E0; }
        .stat-icon.blue { background: #E8F4FD; }
        .stat-icon.green { background: #E8F8E8; }
        .stat-icon.purple { background: #F3E5F5; }
        .stat-label { font-size: 12px; color: #999; margin-bottom: 5px; }
        .stat-value-row { display: flex; align-items: baseline; }
        .stat-number { font-size: 22px; font-weight: 700; color: #333; }
        .stat-unit { font-size: 12px; color: #999; margin-left: 3px; }
        
        .sleep-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .sleep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sleep-title { font-size: 16px; font-weight: 600; color: #333; }
        .sleep-quality { background: #E8F8E8; color: #7ED321; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
        .sleep-time { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .sleep-block { text-align: center; }
        .sleep-label { font-size: 12px; color: #999; margin-bottom: 5px; }
        .sleep-value { font-size: 20px; font-weight: 600; color: #333; }
        .sleep-divider { width: 1px; height: 40px; background: #eee; }
        .sleep-bar { height: 30px; background: #F0F0F0; border-radius: 15px; overflow: hidden; display: flex; }
        .sleep-segment { height: 100%; }
        .sleep-segment.deep { background: #4A90D9; width: 30%; }
        .sleep-segment.light { background: #7ED321; width: 50%; }
        .sleep-segment.rem { background: #F5A623; width: 20%; }
        .sleep-legend { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #999; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="status-bar"><span>10:30</span><span>📶 5G 🔋</span></div>
        <div class="header">
            <div class="header-top"><span class="back-btn">←</span><span class="header-title">健康数据</span></div>
        </div>
        
        <div class="content">
            <div class="date-tabs">
                <div class="date-tab">日</div>
                <div class="date-tab active">周</div>
                <div class="date-tab">月</div>
            </div>
            
            <div class="health-card">
                <div class="health-header">
                    <span class="health-title">步数</span>
                    <div><span class="health-value">8,562</span><span class="health-unit">步</span></div>
                </div>
                <div class="health-goal">目标 10,000步 · 完成 86%</div>
                <div class="health-chart" style="margin-top: 15px;">
                    <div class="chart-bar" style="height: 60%;"></div>
                    <div class="chart-bar" style="height: 80%;"></div>
                    <div class="chart-bar" style="height: 45%;"></div>
                    <div class="chart-bar" style="height: 90%;"></div>
                    <div class="chart-bar" style="height: 70%;"></div>
                    <div class="chart-bar" style="height: 85%;"></div>
                    <div class="chart-bar" style="height: 55%;"></div>
                </div>
                <div class="chart-labels">
                    <span class="chart-label">一</span>
                    <span class="chart-label">二</span>
                    <span class="chart-label">三</span>
                    <span class="chart-label">四</span>
                    <span class="chart-label">五</span>
                    <span class="chart-label">六</span>
                    <span class="chart-label">日</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon orange">🔥</div>
                    <div class="stat-label">消耗卡路里</div>
                    <div class="stat-value-row"><span class="stat-number">286</span><span class="stat-unit">千卡</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon blue">📏</div>
                    <div class="stat-label">行走距离</div>
                    <div class="stat-value-row"><span class="stat-number">6.2</span><span class="stat-unit">公里</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon green">⛰️</div>
                    <div class="stat-label">爬楼层数</div>
                    <div class="stat-value-row"><span class="stat-number">12</span><span class="stat-unit">层</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon purple">🏃</div>
                    <div class="stat-label">活跃时间</div>
                    <div class="stat-value-row"><span class="stat-number">45</span><span class="stat-unit">分钟</span></div>
                </div>
            </div>
            
            <div class="sleep-card">
                <div class="sleep-header">
                    <span class="sleep-title">睡眠监测</span>
                    <span class="sleep-quality">睡眠优秀</span>
                </div>
                
                <div class="sleep-time">
                    <div class="sleep-block">
                        <div class="sleep-label">入睡</div>
                        <div class="sleep-value">21:30</div>
                    </div>
                    <div class="sleep-divider"></div>
                    <div class="sleep-block">
                        <div class="sleep-label">睡眠时长</div>
                        <div class="sleep-value">9小时15分</div>
                    </div>
                    <div class="sleep-divider"></div>
                    <div class="sleep-block">
                        <div class="sleep-label">醒来</div>
                        <div class="sleep-value">06:45</div>
                    </div>
                </div>
                
                <div class="sleep-bar">
                    <div class="sleep-segment deep"></div>
                    <div class="sleep-segment light"></div>
                    <div class="sleep-segment rem"></div>
                </div>
                
                <div class="sleep-legend">
                    <div class="legend-item"><div class="legend-dot" style="background: #4A90D9;"></div>深睡 30%</div>
                    <div class="legend-item"><div class="legend-dot" style="background: #7ED321;"></div>浅睡 50%</div>
                    <div class="legend-item"><div class="legend-dot" style="background: #F5A623;"></div>REM 20%</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
